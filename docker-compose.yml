services:
  postgres:
    image: postgres:16-alpine
    container_name: pa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pinterest
      POSTGRES_PASSWORD: pinterest
      POSTGRES_DB: pinterest_automation
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinterest -d pinterest_automation"]
      interval: 5s
      timeout: 3s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    container_name: pa-langfuse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pinterest:pinterest@postgres:5432/pinterest_automation?schema=langfuse
      NEXTAUTH_SECRET: dev_change_me_langfuse_secret
      NEXTAUTH_URL: http://localhost:3100
      SALT: dev_change_me_salt
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: pa-org
      LANGFUSE_INIT_PROJECT_ID: pa-project
    ports:
      - "3100:3000"

  pinterest-svc:
    build:
      context: ./apps/pinterest-svc
      dockerfile: Dockerfile
    container_name: pa-pinterest-svc
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pinterest:pinterest@postgres:5432/pinterest_automation
      LANGFUSE_BASE_URL: http://langfuse:3000
    ports:
      - "3001:3001"
    volumes:
      - ./apps/pinterest-svc/src:/app/src:ro
